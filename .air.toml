# Air - Live reload for Go apps
# https://github.com/cosmtrek/air
# Run from project root: air

root = "."
tmp_dir = "apps/api/tmp"

[build]
# Command to build your app (Windows requires .exe)
# Use -C flag to change directory (cross-platform compatible)
cmd = "go build -C apps/api -o ./tmp/server.exe ./cmd/server"
# Binary file name
bin = "apps/api/tmp/server.exe"
# Customize binary run command
full_bin = "apps/api/tmp/server.exe"
# Watch these filename extensions
include_ext = ["go", "tpl", "tmpl", "html", "env"]
# Watch these directories
include_dir = ["apps/api"]
# Ignore these filename extensions or directories
exclude_dir = ["apps/api/assets", "apps/api/tmp", "apps/api/vendor", "apps/web", "node_modules", ".git"]
# Exclude files
exclude_file = []
# Exclude specific regular expressions
exclude_regex = ["_test\\.go$"]
# Exclude unchanged files
exclude_unchanged = true
# Follow symlinks
follow_symlink = true
# This log file places in your tmp_dir
log = "apps/api/tmp/air.log"
# Poll files for changes instead of using fsnotify
poll = false
# Poll interval
poll_interval = 500 # ms
# Add additional arguments when running binary
args = []
# Delay after changes before building
delay = 1000 # ms

[log]
# Show log time
time = true
# Only show main log (silences watcher, build, runner)
main_only = false

[color]
# Customize each part's color. If no color found, use the raw app log.
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true